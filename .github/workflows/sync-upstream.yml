name: Sync upstream

on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:

concurrency:
    group: sync-upstream-rebase
    cancel-in-progress: false

jobs:
    sync:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Fetch upstream
              run: |
                  git remote add upstream https://github.com/DIYgod/RSSHub.git || true
                  git fetch origin master custom
                  git fetch upstream master --tags

            - name: Sync master with upstream/master
              run: |
                  git checkout -B master origin/master
                  git merge --ff-only upstream/master
                  git push origin master

            - name: Rebase custom onto master
              run: |
                  git checkout -B custom origin/custom
                  git rebase master
                  git push --force-with-lease origin custom

            - name: Create or update failure issue
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      const marker = '<!-- sync-upstream-failure -->';
                      const title = '[Sync upstream] automation failed';
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const details = [
                          marker,
                          '',
                          'The scheduled sync/rebase workflow failed.',
                          '',
                          `- Workflow: ${context.workflow}`,
                          `- Run: ${runUrl}`,
                          `- Ref: ${context.ref}`,
                          `- Attempt: ${context.runAttempt}`,
                          '',
                          'Please review the failed run logs and resolve conflicts or permission problems.'
                      ].join('\n');

                      const { data: openIssues } = await github.rest.issues.listForRepo({
                          owner,
                          repo,
                          state: 'open',
                          per_page: 100
                      });

                      const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));

                      if (existing) {
                          await github.rest.issues.createComment({
                              owner,
                              repo,
                              issue_number: existing.number,
                              body: `A new failure occurred.\n\n${details}`
                          });
                          core.info(`Updated existing issue #${existing.number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              owner,
                              repo,
                              title,
                              body: details
                          });
                          core.info(`Created issue #${created.data.number}`);
                      }

            - name: Close stale failure issue on recovery
              if: success()
              continue-on-error: true
              uses: actions/github-script@v7
              with:
                  script: |
                      const marker = '<!-- sync-upstream-failure -->';
                      const title = '[Sync upstream] automation failed';
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

                      const { data: openIssues } = await github.rest.issues.listForRepo({
                          owner,
                          repo,
                          state: 'open',
                          per_page: 100
                      });

                      const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
                      if (!existing) {
                          core.info('No open failure issue to close');
                          return;
                      }

                      await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: `Sync/rebase recovered in this run: ${runUrl}`
                      });
                      await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          state: 'closed'
                      });
                      core.info(`Closed issue #${existing.number}`);
